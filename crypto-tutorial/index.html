<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="币圈新手入门完全指南：先学安全，再学基础概念，再学交易所、钱包、U 卡和美股购买。" />
    <title>币圈新手入门完全指南</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17172a;
        --muted: #6f7284;
        --soft: #f7f3e8;
        --paper: #fefcf6;
        --panel: rgba(255, 255, 255, 0.9);
        --line: rgba(43, 127, 216, 0.22);
        --line-strong: rgba(23, 23, 42, 0.16);
        --blue: #2b7fd8;
        --blue-deep: #002fa7;
        --yellow: #ffd84d;
        --red: #ef4b5f;
        --orange: #ff8a3d;
        --green: #38b870;
        --shadow: 0 24px 80px rgba(23, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background:
          radial-gradient(circle at 14% 12%, rgba(255, 216, 77, 0.25), transparent 26%),
          radial-gradient(circle at 86% 18%, rgba(43, 127, 216, 0.16), transparent 28%),
          linear-gradient(135deg, #fffdf7 0%, #f7f3e8 100%);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
        letter-spacing: 0;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      a {
        color: inherit;
      }

      .deck-topbar {
        position: fixed;
        z-index: 30;
        top: 18px;
        left: 154px;
        right: 24px;
        min-height: 58px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 12px 16px 12px 18px;
        border: 2px dashed rgba(23, 23, 42, 0.12);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.76);
        box-shadow: 0 16px 46px rgba(23, 23, 42, 0.07);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand-mark {
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border: 2px solid var(--ink);
        border-radius: 12px;
        background: var(--yellow);
        box-shadow: 4px 4px 0 rgba(23, 23, 42, 0.12);
        font-weight: 950;
      }

      .brand-title {
        margin: 0;
        font-size: 17px;
        font-weight: 950;
        white-space: nowrap;
      }

      .brand-subtitle {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .progress-pill,
      .hint-pill {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 12px;
        border: 1px solid rgba(23, 23, 42, 0.1);
        border-radius: 999px;
        background: #fff;
        color: var(--muted);
        font-size: 12px;
        font-weight: 850;
      }

      .progress-pill {
        color: var(--blue-deep);
      }

      .chapter-rail {
        position: fixed;
        z-index: 32;
        top: 18px;
        left: 18px;
        bottom: 18px;
        width: 116px;
        padding: 12px;
        border: 2px dashed rgba(43, 127, 216, 0.24);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .chapter-tab {
        width: 100%;
        min-height: 46px;
        border: 1px solid rgba(23, 23, 42, 0.1);
        border-radius: 18px;
        background: #fff;
        color: var(--muted);
        display: grid;
        grid-template-columns: 28px 1fr;
        align-items: center;
        gap: 7px;
        padding: 8px;
        text-align: left;
        font-size: 12px;
        font-weight: 900;
        transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      }

      .chapter-tab:hover {
        transform: translateY(-1px);
        border-color: rgba(43, 127, 216, 0.34);
      }

      .chapter-tab.is-active {
        background: var(--yellow);
        color: var(--ink);
        border-color: rgba(23, 23, 42, 0.28);
        box-shadow: 3px 3px 0 rgba(43, 127, 216, 0.16);
      }

      .chapter-tab .no {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        border-radius: 10px;
        background: rgba(43, 127, 216, 0.12);
        color: var(--blue-deep);
      }

      .chapter-tab.is-active .no {
        background: #fff;
      }

      .mobile-tabs {
        display: none;
      }

      .deck {
        position: relative;
        z-index: 1;
        width: 100vw;
        height: 100dvh;
        display: flex;
        transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1);
        will-change: transform;
      }

      .slide {
        flex: 0 0 100vw;
        width: 100vw;
        height: 100dvh;
        padding: 92px 42px 42px 154px;
        display: flex;
        align-items: stretch;
      }

      .slide-frame {
        width: min(1180px, 100%);
        height: calc(100dvh - 134px);
        margin: 0 auto;
        overflow: auto;
        border-radius: 28px;
        background: var(--panel);
        border: 2px dashed var(--line);
        padding: 48px;
        box-shadow: var(--shadow);
        scrollbar-width: thin;
        scrollbar-color: rgba(43, 127, 216, 0.34) transparent;
      }

      .slide-frame::-webkit-scrollbar {
        width: 10px;
      }

      .slide-frame::-webkit-scrollbar-thumb {
        background: rgba(43, 127, 216, 0.26);
        border-radius: 999px;
      }

      .slide-head {
        display: grid;
        grid-template-columns: 112px minmax(0, 1fr);
        gap: 24px;
        align-items: center;
        margin-bottom: 28px;
      }

      .slide-no {
        width: 112px;
        height: 112px;
        display: grid;
        place-items: center;
        border-radius: 28px;
        border: 2px solid var(--ink);
        background: var(--yellow);
        box-shadow: 8px 8px 0 rgba(23, 23, 42, 0.12);
        font-size: 44px;
        line-height: 1;
        font-weight: 950;
      }

      .script {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(43, 127, 216, 0.1);
        color: var(--blue-deep);
        font-size: 12px;
        font-weight: 950;
      }

      .script::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--red);
        box-shadow: 16px 0 0 var(--yellow), 32px 0 0 var(--blue);
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      .slide-title {
        margin: 12px 0 8px;
        font-size: 42px;
        line-height: 1.08;
        font-weight: 950;
      }

      .slide-en {
        margin: 0 0 12px;
        color: var(--blue-deep);
        font-size: 15px;
        font-weight: 950;
      }

      .lead {
        max-width: 850px;
        margin: 0;
        color: #4d5064;
        font-size: 16px;
        line-height: 1.75;
        font-weight: 650;
      }

      .section-label {
        margin: 0 0 14px;
        color: var(--blue-deep);
        font-size: 13px;
        font-weight: 950;
      }

      .content-stack {
        display: grid;
        gap: 22px;
      }

      .split {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
        gap: 22px;
        align-items: start;
      }

      .grid-2,
      .grid-3,
      .grid-4 {
        display: grid;
        gap: 16px;
      }

      .grid-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grid-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid-4 {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .tile,
      .art-tile,
      .ref-tile,
      .faq-item,
      .quiz-panel,
      .table-wrap {
        border: 1px solid rgba(23, 23, 42, 0.1);
        border-radius: 24px;
        background: #fff;
        box-shadow: 0 16px 40px rgba(23, 23, 42, 0.06);
      }

      .tile,
      .ref-tile,
      .quiz-panel {
        padding: 20px;
      }

      .tile h3,
      .ref-tile h3,
      .quiz-panel h3 {
        margin: 0 0 10px;
        font-size: 19px;
        line-height: 1.28;
        font-weight: 950;
      }

      .tile p,
      .ref-tile p,
      .quiz-panel p,
      .faq-item p {
        color: #4d5064;
        line-height: 1.72;
        font-weight: 620;
      }

      .tile p:last-child,
      .ref-tile p:last-child,
      .quiz-panel p:last-child,
      .faq-item p:last-child {
        margin-bottom: 0;
      }

      .kicker-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .chip,
      .local-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 30px;
        padding: 6px 10px;
        border: 1px dashed rgba(43, 127, 216, 0.28);
        border-radius: 999px;
        background: rgba(43, 127, 216, 0.08);
        color: var(--blue-deep);
        font-size: 12px;
        font-weight: 900;
      }

      .local-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .local-link {
        border-style: solid;
      }

      .eyebrow {
        display: inline-flex;
        width: fit-content;
        margin-bottom: 10px;
        padding: 5px 9px;
        border-radius: 999px;
        background: rgba(255, 216, 77, 0.46);
        color: #4b4213;
        font-size: 11px;
        font-weight: 950;
      }

      .warning,
      .risk-box,
      .next-box {
        border-radius: 24px;
        padding: 20px;
        border: 2px dashed rgba(23, 23, 42, 0.14);
      }

      .warning {
        background: #fff6bf;
      }

      .risk-box {
        background: #fff0e8;
        border-color: rgba(255, 138, 61, 0.35);
      }

      .risk-box strong,
      .warning strong {
        display: block;
        margin-bottom: 8px;
        font-size: 16px;
      }

      .red-tile {
        border-color: rgba(239, 75, 95, 0.22);
        background: #fff7f8;
      }

      .blue-tile {
        border-color: rgba(43, 127, 216, 0.22);
        background: #f7fbff;
      }

      .yellow-tile {
        border-color: rgba(255, 216, 77, 0.34);
        background: #fffdf0;
      }

      .art-tile {
        overflow: hidden;
      }

      .art-tile img {
        display: block;
        width: 100%;
        aspect-ratio: 936 / 500;
        object-fit: contain;
        background: #fefcf6;
      }

      .art-caption {
        padding: 12px 16px 16px;
        margin: 0;
        color: #4d5064;
        font-size: 13px;
        font-weight: 750;
        line-height: 1.6;
      }

      .steps {
        display: grid;
        gap: 12px;
      }

      .step {
        display: grid;
        grid-template-columns: 44px 1fr;
        gap: 14px;
        align-items: start;
        padding: 16px;
        border: 1px solid rgba(23, 23, 42, 0.1);
        border-radius: 20px;
        background: #fff;
      }

      .step-no {
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        border: 2px solid var(--ink);
        border-radius: 15px;
        background: var(--yellow);
        font-weight: 950;
      }

      .step h3 {
        margin: 0 0 6px;
        font-size: 17px;
      }

      .step p {
        margin: 0;
        color: #4d5064;
        line-height: 1.68;
        font-weight: 620;
      }

      .table-wrap {
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }

      th,
      td {
        padding: 15px 16px;
        border-bottom: 1px solid rgba(23, 23, 42, 0.08);
        text-align: left;
        vertical-align: top;
        line-height: 1.62;
      }

      th {
        background: #fff9d7;
        color: var(--ink);
        font-size: 13px;
        font-weight: 950;
      }

      td {
        color: #4d5064;
        font-weight: 620;
      }

      .timeline {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
      }

      .timeline-item {
        position: relative;
        padding: 16px;
        border: 1px solid rgba(23, 23, 42, 0.1);
        border-radius: 20px;
        background: #fff;
      }

      .timeline-item::after {
        content: "→";
        position: absolute;
        right: -13px;
        top: 50%;
        color: var(--red);
        font-size: 22px;
        font-weight: 950;
      }

      .timeline-item:last-child::after {
        display: none;
      }

      .timeline-item strong {
        display: block;
        margin-bottom: 8px;
        color: var(--blue-deep);
        font-size: 16px;
      }

      .timeline-item span {
        color: #4d5064;
        font-size: 13px;
        line-height: 1.58;
        font-weight: 650;
      }

      .ref-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .ref-tile {
        display: grid;
        gap: 12px;
      }

      .ref-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .ref-meta span {
        display: inline-flex;
        min-height: 28px;
        align-items: center;
        padding: 5px 9px;
        border-radius: 999px;
        background: rgba(43, 127, 216, 0.08);
        color: var(--blue-deep);
        font-size: 12px;
        font-weight: 900;
      }

      .ref-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn {
        min-height: 40px;
        border: 1px solid rgba(23, 23, 42, 0.14);
        border-radius: 999px;
        background: #fff;
        color: var(--ink);
        padding: 0 14px;
        font-size: 13px;
        font-weight: 950;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 24px rgba(23, 23, 42, 0.08);
      }

      .btn.primary {
        background: var(--blue-deep);
        color: #fff;
        border-color: var(--blue-deep);
      }

      .btn.yellow {
        background: var(--yellow);
      }

      .faq-list {
        display: grid;
        gap: 12px;
      }

      .faq-item {
        padding: 0;
        overflow: hidden;
      }

      .faq-item summary {
        cursor: pointer;
        padding: 18px 20px;
        font-weight: 950;
      }

      .faq-item p {
        padding: 0 20px 18px;
      }

      .quiz-options {
        display: grid;
        gap: 10px;
        margin: 18px 0;
      }

      .quiz-option {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 48px;
        padding: 12px 14px;
        border: 1px solid rgba(23, 23, 42, 0.1);
        border-radius: 16px;
        background: #fff;
        font-weight: 820;
      }

      .quiz-option input {
        width: 18px;
        height: 18px;
        accent-color: var(--blue-deep);
      }

      .quiz-result {
        min-height: 44px;
        padding: 12px 14px;
        border-radius: 18px;
        background: #f7fbff;
        color: #4d5064;
        font-weight: 750;
        line-height: 1.62;
      }

      .slide-footer {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: stretch;
        margin-top: 26px;
      }

      .next-box {
        width: 50%;
        min-height: 86px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: rgba(255, 255, 255, 0.76);
      }

      .next-box span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .next-box strong {
        margin-top: 6px;
        font-size: 17px;
        font-weight: 950;
      }

      .next-box button {
        border: 0;
        background: transparent;
        padding: 0;
        text-align: left;
        color: inherit;
      }

      .next-box.align-right {
        text-align: right;
      }

      .next-box.align-right button {
        text-align: right;
      }

      .deck-arrow {
        position: fixed;
        z-index: 31;
        top: 50%;
        width: 46px;
        height: 46px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        border: 2px solid rgba(23, 23, 42, 0.12);
        background: rgba(255, 255, 255, 0.9);
        color: var(--blue-deep);
        box-shadow: 0 14px 36px rgba(23, 23, 42, 0.1);
        font-size: 28px;
        font-weight: 950;
      }

      .deck-arrow:disabled {
        opacity: 0.35;
        cursor: default;
      }

      .deck-prev {
        left: 136px;
      }

      .deck-next {
        right: 20px;
      }

      .toast {
        position: fixed;
        z-index: 40;
        left: 50%;
        bottom: 28px;
        transform: translateX(-50%);
        padding: 12px 16px;
        border-radius: 999px;
        background: var(--ink);
        color: #fff;
        font-weight: 850;
        box-shadow: 0 18px 44px rgba(23, 23, 42, 0.18);
      }

      .hidden {
        display: none;
      }

      .source-list {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .source-list a {
        min-height: 56px;
        padding: 12px;
        border: 1px solid rgba(23, 23, 42, 0.1);
        border-radius: 18px;
        background: #fff;
        color: var(--blue-deep);
        font-size: 13px;
        font-weight: 900;
        line-height: 1.42;
        text-decoration: none;
      }

      @media (max-width: 1080px) {
        .deck-topbar {
          left: 132px;
        }

        .chapter-rail {
          width: 100px;
        }

        .slide {
          padding-left: 132px;
        }

        .deck-prev {
          left: 114px;
        }

        .split,
        .grid-3,
        .grid-4,
        .timeline,
        .source-list {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        body {
          background: linear-gradient(135deg, #fffdf7 0%, #f7f3e8 100%);
        }

        .chapter-rail {
          display: none;
        }

        .deck-topbar {
          top: 10px;
          left: 10px;
          right: 10px;
          min-height: 54px;
          border-radius: 20px;
        }

        .brand-subtitle,
        .hint-pill {
          display: none;
        }

        .brand-title {
          font-size: 15px;
        }

        .mobile-tabs {
          position: fixed;
          z-index: 120;
          left: 10px;
          right: 10px;
          bottom: 10px;
          display: flex;
          gap: 8px;
          overflow-x: auto;
          padding: 8px;
          border: 2px dashed rgba(43, 127, 216, 0.24);
          border-radius: 22px;
          background: rgba(255, 255, 255, 0.9);
          box-shadow: 0 12px 34px rgba(23, 23, 42, 0.1);
          scrollbar-width: none;
          pointer-events: auto;
        }

        .mobile-tabs::-webkit-scrollbar {
          display: none;
        }

        .mobile-tab {
          flex: 0 0 auto;
          min-width: 74px;
          min-height: 42px;
          border: 1px solid rgba(23, 23, 42, 0.1);
          border-radius: 16px;
          background: #fff;
          color: var(--muted);
          font-size: 12px;
          font-weight: 950;
        }

        .mobile-tab.is-active {
          background: var(--yellow);
          color: var(--ink);
        }

        .slide {
          padding: 78px 12px 88px;
        }

        .slide-frame {
          height: calc(100dvh - 166px);
          padding: 22px;
          border-radius: 24px;
        }

        .slide-head {
          grid-template-columns: 72px minmax(0, 1fr);
          gap: 14px;
        }

        .slide-no {
          width: 72px;
          height: 72px;
          border-radius: 22px;
          font-size: 30px;
        }

        .slide-title {
          font-size: 28px;
        }

        .lead {
          font-size: 15px;
        }

        .grid-2,
        .grid-3,
        .grid-4,
        .split,
        .timeline,
        .ref-grid,
        .source-list {
          grid-template-columns: 1fr;
        }

        .timeline-item::after {
          right: auto;
          left: 20px;
          top: auto;
          bottom: -18px;
          transform: rotate(90deg);
        }

        .slide-footer {
          flex-direction: column;
        }

        .next-box {
          width: 100%;
        }

        .deck-arrow {
          display: none;
        }

        .ref-actions .btn {
          flex: 1 1 120px;
        }

      }
    </style>
  </head>
  <body>
    <header class="deck-topbar" aria-label="站点顶部栏">
      <div class="brand">
        <div class="brand-mark">U</div>
        <div>
          <p class="brand-title">币圈新手入门完全指南</p>
          <p class="brand-subtitle">先学安全，再学注册，最后再看 U 卡和美股购买</p>
        </div>
      </div>

      `).join("");

      mobileTabs.innerHTML = chapters.map((chapter, index) => `
        <button class="mobile-tab" type="button" data-go="${index}">${chapter.no} ${chapter.short}</button>
      `).join("");

      function goTo(index) {
        const next = Math.max(0, Math.min(chapters.length - 1, index));
        currentIndex = next;
        deck.style.transform = `translate3d(${-currentIndex * 100}vw, 0, 0)`;
        progress.textContent = `${chapters[currentIndex].no} / ${String(chapters.length).padStart(2, "0")}`;
        prevButton.disabled = currentIndex === 0;
        nextButton.disabled = currentIndex === chapters.length - 1;
        document.querySelectorAll("[data-go]").forEach((button) => {
          const active = Number(button.dataset.go) === currentIndex;
          button.classList.toggle("is-active", active);
          if (active) {
            button.setAttribute("aria-current", "true");
            if (button.classList.contains("mobile-tab")) {
              button.scrollIntoView({ inline: "center", block: "nearest" });
            }
          } else {
            button.removeAttribute("aria-current");
          }
        });
        const frame = deck.children[currentIndex]?.querySelector("[data-slide-frame]");
        if (frame) frame.scrollTop = 0;
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.remove("hidden");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => toast.classList.add("hidden"), 1700);
      }

      function setupBottomHints() {
        document.querySelectorAll("[data-slide-frame]").forEach((frame, index) => {
          frame.addEventListener("scroll", () => {
            const canScroll = frame.scrollHeight > frame.clientHeight + 8;
            const atBottom = frame.scrollTop + frame.clientHeight >= frame.scrollHeight - 6;
            if (canScroll && atBottom && frame.dataset.bottomHinted !== "true") {
              frame.dataset.bottomHinted = "true";
              showToast(index < chapters.length - 1 ? "已经到底，向右滑进入下一章" : "已经到底，可以用章节导航回看");
            }
            if (!atBottom) {
              frame.dataset.bottomHinted = "";
            }
          }, { passive: true });
        });
      }

      setupBottomHints();

      document.addEventListener("click", (event) => {
        const goButton = event.target.closest("[data-go]");
        if (goButton) {
          goTo(Number(goButton.dataset.go));
          return;
        }

        const copyButton = event.target.closest("[data-copy]");
        if (copyButton) {
          navigator.clipboard?.writeText(copyButton.dataset.copy).then(() => {
            showToast(`已复制：${copyButton.dataset.copy}`);
          }).catch(() => {
            showToast(`邀请码：${copyButton.dataset.copy}`);
          });
          return;
        }

        const localButton = event.target.closest("[data-local-target]");
        if (localButton) {
          const target = document.querySelector(localButton.dataset.localTarget);
          target?.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      });

      prevButton.addEventListener("click", () => goTo(currentIndex - 1));
      nextButton.addEventListener("click", () => goTo(currentIndex + 1));

      document.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") goTo(currentIndex - 1);
        if (event.key === "ArrowRight") goTo(currentIndex + 1);
      });

      deck.addEventListener("touchstart", (event) => {
        touchStartX = event.touches[0].clientX;
        touchStartY = event.touches[0].clientY;
      }, { passive: true });

      deck.addEventListener("touchend", (event) => {
        const touch = event.changedTouches[0];
        const diffX = touch.clientX - touchStartX;
        const diffY = touch.clientY - touchStartY;
        if (Math.abs(diffX) > 54 && Math.abs(diffX) > Math.abs(diffY)) {
          goTo(currentIndex + (diffX < 0 ? 1 : -1));
        }
      }, { passive: true });

      function renderQuiz() {
        const item = quizQuestions[quizIndex];
        document.querySelector("#quizLevel").textContent = `${item.title} · ${quizIndex + 1}/${quizQuestions.length}`;
        document.querySelector("#quizTitle").textContent = item.type;
        document.querySelector("#quizQuestion").textContent = item.question;
        document.querySelector("#quizResult").textContent = "选完后点击检查答案。";
        const inputType = item.type === "多选" ? "checkbox" : "radio";
        document.querySelector("#quizOptions").innerHTML = item.options.map((option, index) => `
          <label class="quiz-option">
            <input type="${inputType}" name="quiz" value="${index}" />
            <span>${option}</span>
          </label>
        `).join("");
      }

      document.querySelector("#checkQuiz").addEventListener("click", () => {
        const selected = Array.from(document.querySelectorAll("input[name='quiz']:checked")).map((input) => Number(input.value));
        const item = quizQuestions[quizIndex];
        const ok = selected.length === item.answer.length && selected.every((value) => item.answer.includes(value));
        document.querySelector("#quizResult").textContent = ok ? `答对了。${item.explain}` : `还差一点。${item.explain}`;
      });

      document.querySelector("#nextQuiz").addEventListener("click", () => {
        quizIndex = (quizIndex + 1) % quizQuestions.length;
        renderQuiz();
      });

      renderQuiz();
      goTo(0);
    </script>
  </body>
</html>
